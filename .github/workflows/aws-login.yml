name: Dry Run Workflow

on:
  push:
    branches:
      - dv_feature

jobs:
  dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Simulate build number (like Jenkins)
      - name: Generate version
        run: |
          VERSION="3.6.0.0.${{ github.run_number }}"
          echo "Version: $VERSION"

      # ✅ Install tools
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip jq

      # ✅ Simulate lambda file path
      - name: Set lambda file path
        run: echo "Using qa_lambdas.json"

      # ✅ Dry run zip (no AWS)
      - name: Zip Lambda Scripts (dry run)
        run: |
          for dir in $(jq -r '.[].code' qa_lambdas.json); do
            name=$(basename $dir)
            echo "Zipping $dir -> $name.zip"
            zip -r "$name.zip" "$dir"
          done

      # ✅ Fake AWS commands (no real execution)
      - name: Simulate AWS commands
        run: |
          echo "aws sts get-caller-identity"
          echo "aws ec2 describe-subnets"
          echo "aws lambda update-function-code"

      # ✅ Finish
      - name: Done
        run: echo "Dry run completed successfully"
